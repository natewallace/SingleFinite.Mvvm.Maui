name: Package

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install .NET MAUI
        shell: bash
        run: dotnet workload install maui
      - name: Build the project
        run: dotnet build --configuration Release SingleFinite.Mvvm.Maui
      - name: Create the package
        run: dotnet pack --configuration Release SingleFinite.Mvvm.Maui
      - name: Publish the package
        run: dotnet nuget push SingleFinite.Mvvm.Maui\bin\Release\*.nupkg -s https://api.nuget.org/v3/index.json -k ${{secrets.NUGET_TOKEN}}
